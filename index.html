<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHEMESTRY - Fashion Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f7f7f7;
color:#222;
}

header{
background:#111;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
font-size:30px;
letter-spacing:2px;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

.hero{
height:70vh;
background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url("https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=1200");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-align:center;
}

.hero h2{
font-size:48px;
}

.hero p{
margin:15px;
font-size:18px;
}

.hero button{
padding:15px 35px;
background:#fff;
color:#111;
border:none;
border-radius:30px;
cursor:pointer;
font-size:18px;
}

.products{
padding:60px 10%;
}

.products h2{
text-align:center;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.buy{
background:#111;
color:white;
padding:10px 25px;
border:none;
border-radius:20px;
cursor:pointer;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:50px;
}
</style>

</head>
<body>

<header>
<h1>CHEMESTRY</h1>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h2>Style Meets Chemistry</h2>

<p>Premium Oversized Fashion For Everyone</p>

<button>Shop Now</button>

</section>

<section class="products">

<h2>Trending Collection</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500">
<h3>Oversized T-Shirt</h3>
<p class="price">₹599</p>
<button class="buy">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=500">
<h3>Premium Jeans</h3>
<p class="price">₹999</p>
<button class="buy">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523398002811-999ca8dec234?w=500">
<h3>Hoodie</h3>
<p class="price">₹1,299</p>
<button class="buy">Buy Now</button>
</div>

</div>

</section>

<footer>

<p>© 2026 CHEMESTRY. All Rights Reserved.</p>

</footer>

</body>
</html>
