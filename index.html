<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHEMESTRY | Where Fashion Meets Chemistry</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel CDN for JSX Parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        .font-serif {
            font-family: 'Playfair Display', Georgia, serif;
        }
        .font-mono {
            font-family: 'Space Mono', monospace;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const SEED_PRODUCTS = [
          {
            id: "prod-01",
            sku: "CH-CARB-01",
            name: "Carbon Shield Trench Coat",
            description: "An ultra-minimalist, technical double-breasted trench crafted from hydrophobic synthetic micro-fibers. Designed to shield against elements while maintaining a razor-sharp high-fashion silhouette.",
            price: 8900,
            memberPrice: 6800,
            category: "Outerwear",
            gender: "Unisex",
            sizes: ["S", "M", "L", "XL"],
            colors: ["Vantablack", "Graphite"],
            stock: 14,
            rating: 4.9,
            reviewsCount: 3,
            tags: ["Elemental", "Waterproof", "Best Seller"],
            featured: true,
            trending: true,
            reviews: [
              { author: "Marcus K.", rating: 5, text: "Unbelievable drape. Rejects torrential rain like liquid glass.", date: "2026-06-12" },
              { author: "Anya V.", rating: 5, text: "The Vantablack finish is exceptionally deep and absorbs light beautifully.", date: "2026-07-02" },
              { author: "Devon S.", rating: 4.8, text: "Incredibly warm yet lightweight. High utility pockets.", date: "2026-07-10" }
            ]
          },
          {
            id: "prod-02",
            sku: "CH-SYNT-02",
            name: "Synthesis Oversized Tech Hoodie",
            description: "Constructed with dual-knit dense organic cotton and high-performance smart polymers. Featuring a drop-shoulder structure and a heavy-gauge magnetic cowl hood closure system.",
            price: 4900,
            memberPrice: 3600,
            category: "Tops",
            gender: "Unisex",
            sizes: ["XS", "S", "M", "L", "XL"],
            colors: ["Chalk White", "Obsidian"],
            stock: 22,
            rating: 4.8,
            reviewsCount: 2,
            tags: ["Synthesis", "Minimal"],
            featured: true,
            trending: false,
            reviews: [
              { author: "Rohan D.", rating: 5, text: "Heavy gauge knit has fantastic architectural structure.", date: "2026-05-18" },
              { author: "Sarah P.", rating: 4.6, text: "The magnetic collar snap is incredibly satisfying.", date: "2026-06-29" }
            ]
          },
          {
            id: "prod-03",
            sku: "CH-ISOT-03",
            name: "Isotope Modular Cargo Pants",
            description: "Asymmetrical modular pocket layout trousers crafted with dynamic stretch ripstop weave. Finished with custom cold-forged steel buckles and micro-adjust dynamic ankle straps.",
            price: 5800,
            memberPrice: 4200,
            category: "Bottoms",
            gender: "Unisex",
            sizes: ["28", "30", "32", "34"],
            colors: ["Krypton Gray", "Vantablack"],
            stock: 9,
            rating: 4.7,
            reviewsCount: 1,
            tags: ["Modular", "Techwear"],
            featured: false,
            trending: true,
            reviews: [
              { author: "Kieran G.", rating: 4.7, text: "The magnetic cargo detachment rules. Highly breathable.", date: "2026-07-11" }
            ]
          },
          {
            id: "prod-04",
            sku: "CH-CATA-04",
            name: "Catalyst Vulcanized Boots",
            description: "Premium full-grain leather boots built on top of extreme durability vulcanized carbon rubber soles. Designed with scientific ergonomics to elevate posture and maximize stride energy.",
            price: 11200,
            memberPrice: 8500,
            category: "Footwear",
            gender: "Unisex",
            sizes: ["UK 7", "UK 8", "UK 9", "UK 10"],
            colors: ["Core Black", "Silver Matte"],
            stock: 5,
            rating: 5.0,
            reviewsCount: 1,
            tags: ["Footwear", "Premium"],
            featured: true,
            trending: true,
            reviews: [
              { author: "Lukas V.", rating: 5, text: "Fits beautifully. Like walking on structured clouds.", date: "2026-07-14" }
            ]
          }
        ];

        function App() {
          const [currentRoute, setCurrentRoute] = useState('home');
          const [selectedProduct, setSelectedProduct] = useState(null);
          const [products, setProducts] = useState(SEED_PRODUCTS);
          const [themeMode, setThemeMode] = useState('dark');
          const [activeRole, setActiveRole] = useState('customer');

          const [cart, setCart] = useState([]);
          const [wishlist, setWishlist] = useState([]);
          const [activeCoupon, setActiveCoupon] = useState(null);
          const [enteredCouponText, setEnteredCouponText] = useState("");
          const [toastMessage, setToastMessage] = useState(null);
          const [selectedInvoice, setSelectedInvoice] = useState(null);

          const [shopCategory, setShopCategory] = useState("All");
          const [shopGender, setShopGender] = useState("All");
          const [shopSort, setShopSort] = useState("Default");
          const [searchQuery, setSearchQuery] = useState("");

          const [paymentStep, setPaymentStep] = useState(null);
          const [selectedPaymentMethod, setSelectedPaymentMethod] = useState('cod');
          const [useWalletCredits, setUseWalletCredits] = useState(false);
          const [editingProduct, setEditingProduct] = useState(null);

          const [orders, setOrders] = useState([
            {
              id: "ORD-9201",
              items: [
                { product: SEED_PRODUCTS[0], quantity: 1, selectedSize: "M", selectedColor: "Vantablack" }
              ],
              subtotal: 8900,
              discount: 2100,
              shipping: 0,
              total: 6800,
              paymentMethod: "COD",
              paymentStatus: "Pending",
              status: "Processing",
              createdAt: "2026-07-13T14:22:00.000Z",
              trackingId: "TRACK-CH-882910"
            }
          ]);

          const [userProfile, setUserProfile] = useState({
            name: "Julian Vane",
            email: "julian@vane.com",
            isMember: true,
            membershipExpires: "2027-01-10",
            walletBalance: 750,
            referralCode: "CHEM-JULIAN-901",
            referredCount: 3,
            addresses: [
              { id: "addr-1", type: "Home", street: "12 Carbon Boulevard, Sector 4", city: "Mumbai", pin: "400001", phone: "9876543210" }
            ]
          });

          const triggerToast = (msg) => {
            setToastMessage(msg);
            setTimeout(() => setToastMessage(null), 4000);
          };

          const cartSubtotal = useMemo(() => {
            return cart.reduce((acc, item) => {
              const priceToUse = userProfile.isMember ? item.product.memberPrice : item.product.price;
              return acc + (priceToUse * item.quantity);
            }, 0);
          }, [cart, userProfile.isMember]);

          const discountAmount = useMemo(() => {
            if (!activeCoupon) return 0;
            return activeCoupon.type === 'percentage' 
              ? Math.round((cartSubtotal * activeCoupon.value) / 100)
              : activeCoupon.value;
          }, [cartSubtotal, activeCoupon]);

          const shippingCost = useMemo(() => cartSubtotal > 0 && cartSubtotal < 999 ? 49 : 0, [cartSubtotal]);
          const walletDeductionApplied = useMemo(() => {
            if (!useWalletCredits) return 0;
            return Math.min(userProfile.walletBalance, cartSubtotal - discountAmount + shippingCost);
          }, [useWalletCredits, userProfile.walletBalance, cartSubtotal, discountAmount, shippingCost]);

          const cartTotal = useMemo(() => {
            return Math.max(0, cartSubtotal - discountAmount + shippingCost - walletDeductionApplied);
          }, [cartSubtotal, discountAmount, shippingCost, walletDeductionApplied]);

          const handleAddToCart = (product, size, color) => {
            setCart([...cart, { product, quantity: 1, selectedSize: size, selectedColor: color }]);
            triggerToast(`Added ${product.name} to capsule!`);
          };

          const handleRemoveFromCart = (index) => {
            const updated = [...cart];
            updated.splice(index, 1);
            setCart(updated);
          };

          const toggleWishlist = (product) => {
            const exists = wishlist.some(item => item.id === product.id);
            if (exists) {
              setWishlist(wishlist.filter(item => item.id !== product.id));
              triggerToast(`Removed from wishlist.`);
            } else {
              setWishlist([...wishlist, product]);
              triggerToast(`Added to wishlist!`);
            }
          };

          const completePaymentFlow = (e) => {
            e.preventDefault();
            setPaymentStep('processing');
            setTimeout(() => {
              const orderId = `ORD-${Math.floor(Math.random() * 90000) + 10000}`;
              const newOrder = {
                id: orderId,
                items: [...cart],
                subtotal: cartSubtotal,
                discount: discountAmount + walletDeductionApplied,
                shipping: shippingCost,
                total: cartTotal,
                paymentMethod: selectedPaymentMethod === 'cod' ? "COD" : "Online Payment",
                paymentStatus: selectedPaymentMethod === 'cod' ? "Pending" : "Paid",
                status: "Placed",
                createdAt: new Date().toISOString(),
                trackingId: `TRACK-CH-${Math.floor(Math.random() * 900000) + 100000}`
              };

              setOrders([newOrder, ...orders]);
              setCart([]);
              setPaymentStep('success');
              triggerToast("Order processed successfully!");
            }, 1500);
          };

          const handleStaffUpdateStatus = (orderId, newStatus) => {
            setOrders(orders.map(o => o.id === orderId ? { ...o, status: newStatus, paymentStatus: newStatus === 'Delivered' ? 'Paid' : o.paymentStatus } : o));
            triggerToast(`Order status updated to ${newStatus}`);
          };

          const filteredProducts = useMemo(() => {
            let result = [...products];
            if (searchQuery) result = result.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
            if (shopCategory !== "All") result = result.filter(p => p.category === shopCategory);
            return result;
          }, [products, searchQuery, shopCategory]);

          return (
            <div className={`min-h-screen ${themeMode === 'dark' ? 'bg-zinc-950 text-white' : 'bg-zinc-50 text-zinc-900'}`}>
              
              {toastMessage && (
                <div className="fixed top-6 right-6 z-50 bg-zinc-900 border border-yellow-500 text-white text-xs px-5 py-3 rounded-lg shadow-2xl">
                  {toastMessage}
                </div>
              )}

              {/* Navigation Bar */}
              <header className="border-b border-zinc-800/40 p-4 sticky top-0 bg-zinc-950/80 backdrop-blur-md z-40">
                <div className="max-w-7xl mx-auto flex justify-between items-center">
                  <button onClick={() => setCurrentRoute('home')} className="flex items-center gap-2">
                    <span className="font-serif text-2xl font-black tracking-widest text-white">CHEMESTRY</span>
                  </button>

                  <div className="flex gap-4 text-xs uppercase tracking-wider font-mono">
                    <button onClick={() => setCurrentRoute('shop')} className="hover:text-yellow-400">Shop</button>
                    <button onClick={() => setCurrentRoute('portal')} className="hover:text-yellow-400">Portal</button>
                    <button onClick={() => setCurrentRoute('membership')} className="hover:text-yellow-400">Membership</button>
                  </div>

                  <div className="flex items-center gap-4">
                    {/* Sandbox Role Quick Toggle */}
                    <div className="bg-zinc-900 border border-zinc-800 rounded-full px-2 py-1 flex items-center gap-1.5 text-[10px]">
                      <button onClick={() => { setActiveRole('customer'); setCurrentRoute('home'); }} className={`px-2 py-0.5 rounded-full ${activeRole === 'customer' ? 'bg-white text-black' : 'text-zinc-400'}`}>Guest</button>
                      <button onClick={() => { setActiveRole('staff'); setCurrentRoute('staff'); }} className={`px-2 py-0.5 rounded-full ${activeRole === 'staff' ? 'bg-cyan-500 text-black' : 'text-zinc-400'}`}>Staff</button>
                    </div>

                    <button onClick={() => setCurrentRoute('wishlist')} className="text-sm">❤️ {wishlist.length}</button>
                    <button onClick={() => setCurrentRoute('cart')} className="bg-zinc-900 border border-zinc-800 p-2 rounded">🛒 {cart.length}</button>
                  </div>
                </div>
              </header>

              {/* Dynamic Pages */}
              <main className="max-w-6xl mx-auto p-6 min-h-screen">
                {currentRoute === 'home' && (
                  <div className="space-y-16 py-12 text-center">
                    <div className="space-y-4">
                      <span className="text-xs font-mono text-cyan-400 uppercase tracking-widest">Active System Drop</span>
                      <h1 className="text-5xl md:text-7xl font-serif font-black tracking-tight text-white leading-none">WHERE FASHION MEETS CHEMISTRY</h1>
                      <p className="text-zinc-400 max-w-xl mx-auto text-xs md:text-sm font-light">Minimalist silhouette engineering utilizing heavy density fabrics with protective elemental properties.</p>
                      <button onClick={() => setCurrentRoute('shop')} className="px-8 py-3 bg-white text-black font-mono font-bold text-xs rounded hover:bg-yellow-400">Launch Laboratory</button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-left">
                      {products.map(p => (
                        <div key={p.id} className="bg-zinc-900/50 border border-zinc-850 p-4 rounded-xl flex flex-col justify-between">
                          <div>
                            <div className="h-48 bg-zinc-950 rounded flex items-center justify-center font-mono text-xs text-zinc-600 border border-zinc-900">IMAGE_{p.sku}</div>
                            <h3 className="font-serif font-bold text-white text-base mt-3">{p.name}</h3>
                            <p className="text-zinc-400 text-xs line-clamp-2 mt-1">{p.description}</p>
                          </div>
                          <div className="flex justify-between items-center mt-4">
                            <span className="font-mono text-sm text-yellow-400">₹{p.memberPrice}</span>
                            <button onClick={() => { setSelectedProduct(p); setCurrentRoute('product-detail'); }} className="px-3 py-1.5 bg-white text-black text-[10px] uppercase font-bold rounded">View</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {currentRoute === 'shop' && (
                  <div className="space-y-6">
                    <div className="border-b border-zinc-800 pb-4">
                      <h2 className="text-2xl font-serif font-bold text-white uppercase">CHEMISTRY CATALOGS</h2>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      {filteredProducts.map(p => (
                        <div key={p.id} className="bg-zinc-900 border border-zinc-850 p-4 rounded-xl flex flex-col justify-between">
                          <h3 className="font-serif font-bold text-white text-lg">{p.name}</h3>
                          <span className="text-zinc-400 text-xs font-mono block mt-2">Class: {p.category}</span>
                          <div className="flex justify-between items-center mt-4">
                            <span className="text-yellow-400 font-mono text-sm">₹{p.memberPrice}</span>
                            <button onClick={() => { setSelectedProduct(p); setCurrentRoute('product-detail'); }} className="px-4 py-2 bg-white text-black text-xs font-bold rounded">Inspect</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {currentRoute === 'product-detail' && selectedProduct && (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-12 py-8 text-left">
                    <div className="h-96 bg-zinc-900 border border-zinc-850 rounded-2xl flex items-center justify-center">
                      <span className="text-zinc-600 font-mono">SPEC_IMG_{selectedProduct.sku}</span>
                    </div>
                    <div className="space-y-6">
                      <h1 className="text-3xl font-serif font-bold">{selectedProduct.name}</h1>
                      <p className="text-zinc-400 text-xs leading-relaxed">{selectedProduct.description}</p>
                      
                      <div className="p-4 bg-zinc-900 rounded-xl space-y-2 text-xs">
                        <div className="flex justify-between"><span>Regular Price</span><span className="line-through">₹{selectedProduct.price}</span></div>
                        <div className="flex justify-between font-bold text-yellow-400"><span>Member Rate</span><span>₹{selectedProduct.memberPrice}</span></div>
                      </div>

                      <button onClick={() => handleAddToCart(selectedProduct, "M", "Vantablack")} className="w-full py-3 bg-white text-black font-bold uppercase rounded-lg">Add to Capsule</button>
                    </div>
                  </div>
                )}

                {currentRoute === 'wishlist' && (
                  <div className="py-12 text-center">
                    <h2 className="text-2xl font-serif font-bold mb-4">YOUR WISHLIST</h2>
                    {wishlist.length === 0 ? <p className="text-zinc-500 font-mono text-xs">Wishlist is empty.</p> : (
                      <div className="grid grid-cols-3 gap-6">
                        {wishlist.map(p => (
                          <div key={p.id} className="bg-zinc-900 p-4 rounded-xl text-left">
                            <h3 className="font-serif font-bold text-white text-base">{p.name}</h3>
                            <button onClick={() => { setSelectedProduct(p); setCurrentRoute('product-detail'); }} className="text-xs text-yellow-400 underline mt-2">View</button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}

                {currentRoute === 'cart' && (
                  <div className="space-y-8 text-left">
                    <h2 className="text-2xl font-serif font-bold border-b border-zinc-800 pb-4">YOUR CAPSULE QUEUE</h2>
                    {cart.length === 0 ? <p className="text-zinc-500 font-mono text-xs text-center py-12">No products added.</p> : (
                      <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 space-y-4">
                          {cart.map((item, idx) => (
                            <div key={idx} className="p-4 bg-zinc-900 border border-zinc-850 rounded-xl flex justify-between items-center">
                              <div>
                                <h3 className="font-serif font-bold text-sm">{item.product.name}</h3>
                                <span className="text-[10px] font-mono text-zinc-500">Color: {item.selectedColor} | Size: {item.selectedSize}</span>
                              </div>
                              <div className="flex gap-4 items-center">
                                <span className="font-mono text-sm">₹{item.product.memberPrice}</span>
                                <button onClick={() => handleRemoveFromCart(idx)} className="text-xs text-red-400">Expel</button>
                              </div>
                            </div>
                          ))}
                        </div>

                        <div className="bg-zinc-900 border border-zinc-850 p-6 rounded-xl space-y-4">
                          <h3 className="text-xs font-mono text-zinc-400 uppercase font-bold">CHARGES DETAIL</h3>
                          <div className="space-y-2 text-xs font-mono">
                            <div className="flex justify-between"><span>Subtotal</span><span>₹{cartSubtotal}</span></div>
                            <div className="flex justify-between text-cyan-400"><span>Shipping</span><span>{shippingCost === 0 ? 'FREE' : `₹${shippingCost}`}</span></div>
                            <div className="flex justify-between text-yellow-400 font-bold border-t border-zinc-800 pt-2 text-sm"><span>Total Fees</span><span>₹{cartTotal}</span></div>
                          </div>

                          <button onClick={() => setPaymentStep('checkout-form')} className="w-full py-2.5 bg-white text-black font-mono font-bold uppercase rounded-lg text-xs">Checkout</button>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* Secure COD Form Checkout Overlay */}
                {paymentStep && (
                  <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl max-w-sm w-full space-y-4 text-left">
                      <div className="flex justify-between border-b border-zinc-800 pb-2">
                        <span className="text-xs font-mono text-zinc-400">CASH ON DELIVERY MATRIX</span>
                        {paymentStep !== 'processing' && <button onClick={() => setPaymentStep(null)} className="text-xs text-zinc-500 hover:text-white">✕</button>}
                      </div>

                      {paymentStep === 'checkout-form' && (
                        <form onSubmit={completePaymentFlow} className="space-y-4 text-xs font-mono">
                          <div>
                            <label className="text-zinc-500 uppercase block mb-1">Shipping Address Details</label>
                            <input required type="text" placeholder="12 Carbon Street, Sector 4" className="w-full bg-zinc-950 border border-zinc-800 p-2 rounded text-white" />
                          </div>
                          <div>
                            <label className="text-zinc-500 uppercase block mb-1">City Location</label>
                            <input required type="text" placeholder="Mumbai" className="w-full bg-zinc-950 border border-zinc-800 p-2 rounded text-white" />
                          </div>
                          <button type="submit" className="w-full py-3 bg-white text-black font-bold uppercase rounded-lg">Confirm COD Order</button>
                        </form>
                      )}

                      {paymentStep === 'processing' && (
                        <div className="py-8 text-center space-y-4">
                          <div className="w-8 h-8 border-2 border-yellow-400 border-t-transparent rounded-full animate-spin mx-auto"></div>
                          <span className="text-xs font-mono text-zinc-400 block uppercase">Filing tracking details...</span>
                        </div>
                      )}

                      {paymentStep === 'success' && (
                        <div className="py-6 text-center space-y-4">
                          <span className="text-3xl block">📦</span>
                          <h3 className="font-serif font-bold text-white text-lg">Order Scheduled!</h3>
                          <p className="text-xs text-zinc-400 font-light leading-relaxed">Your Cash on Delivery parcel synthesis has started. You can track its status inside your portal.</p>
                          <button onClick={() => { setPaymentStep(null); setCurrentRoute('portal'); }} className="px-6 py-2 bg-white text-black text-xs font-mono rounded">Timeline Portal</button>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {currentRoute === 'portal' && (
                  <div className="space-y-6 text-left">
                    <h2 className="text-2xl font-serif font-black uppercase">YOUR ACCOUNT TIMELINE</h2>
                    {orders.map((o, idx) => (
                      <div key={idx} className="bg-zinc-900 border border-zinc-850 p-6 rounded-xl space-y-4">
                        <div className="flex justify-between text-xs font-mono text-zinc-400">
                          <span>Order: <strong>{o.id}</strong></span>
                          <span>Tracking: <strong>{o.trackingId}</strong></span>
                          <span>Delivery Price: <strong className="text-yellow-400">₹{o.total} (COD)</strong></span>
                        </div>

                        {/* 6 Stage Timeline progress */}
                        <div className="grid grid-cols-6 gap-2 text-[9px] font-mono text-center pt-2">
                          {["Placed", "Confirmed", "Packed", "Shipped", "Out for Delivery", "Delivered"].map((st, sIdx) => {
                            const stages = ["Placed", "Confirmed", "Packed", "Shipped", "Out for Delivery", "Delivered"];
                            const currentIdx = stages.indexOf(o.status);
                            const targetIdx = stages.indexOf(st);
                            const isDone = targetIdx <= currentIdx;
                            return (
                              <div key={sIdx} className="space-y-1">
                                <div className={`h-1.5 rounded ${isDone ? 'bg-yellow-400' : 'bg-zinc-800'}`}></div>
                                <span className={isDone ? 'text-white' : 'text-zinc-600'}>{st}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {/* Staff Control Center */}
                {currentRoute === 'staff' && (
                  <div className="space-y-6 text-left">
                    <h2 className="text-2xl font-serif font-black uppercase">STAFF PACKAGING CONTROL</h2>
                    <div className="bg-zinc-900 p-4 rounded-xl border border-zinc-850 space-y-4">
                      {orders.map((o, idx) => (
                        <div key={idx} className="p-4 bg-zinc-950 rounded-lg space-y-3">
                          <div className="flex justify-between text-xs font-mono">
                            <span>ID: {o.id}</span>
                            <span>Status: <strong className="text-yellow-400">{o.status}</strong></span>
                          </div>

                          <div className="flex flex-wrap gap-2">
                            {["Placed", "Confirmed", "Packed", "Shipped", "Out for Delivery", "Delivered"].map(s => (
                              <button 
                                key={s} 
                                onClick={() => handleStaffUpdateStatus(o.id, s)}
                                className={`px-2 py-1 text-[10px] font-mono rounded ${o.status === s ? 'bg-cyan-500 text-black font-bold' : 'bg-zinc-900 text-zinc-400'}`}>
                                {s}
                              </button>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
